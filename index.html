<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:sans-serif;
text-align:center;
}

button{
width:90%;
height:90px;
font-size:28px;
margin:10px;
}

.count{
font-size:22px;
margin-bottom:20px;
}

</style>

</head>

<body>

<button onclick="add('LB')">
Voix Loïc BUISSON
<div class="count" id="LB">0</div>
</button>

<button onclick="add('FR')">
Voix Florence ROPARS
<div class="count" id="FR">0</div>
</button>

<button onclick="add('Nul')">
Nul
<div class="count" id="Nul">0</div>
</button>

<button onclick="add('Blanc')">
Blanc
<div class="count" id="Blanc">0</div>
</button>

<script>

const url = "https://script.google.com/macros/s/AKfycbz7VcjH8qNR7gU-4Ea-6daw9BZEnKfok7zdr_Luiz9-Alxkf6MbG3Wl5iGOOrsOgyex/exec";

function add(v){

  const el = document.getElementById(v);

  // incrément instantané à l'écran
  let value = parseInt(el.innerText) + 1;
  el.innerText = value;

  // envoi au serveur en arrière-plan
  fetch(url + "?action=add&var=" + v)
    .then(r=>r.text())
    .then(n=>{
      el.innerText = n; // synchronisation
    });

}
function load(v){
fetch(url+"?action=get&var="+v)
.then(r=>r.text())
.then(n=>{
document.getElementById(v).innerText=n;
});
}

["LB","FR","Nul", "Blanc"].forEach(load);

document.addEventListener("DOMContentLoaded", function () {
  ["LB","FR","Nul", "Blanc"].forEach(load);
});
  
</script>

</body>
</html>
