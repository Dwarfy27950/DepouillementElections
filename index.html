<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  font-family:sans-serif;
  text-align:center;
  margin:0;
  background:#f5f5f5;
}

.container{
  display:flex;
  flex-direction:column;
  height:100vh;
}

button{
  flex:1;
  font-size:32px;
  border:none;
  width:90%;
  height:90px;
  margin:6px;
  border-radius:16px;
}

.count{
  font-size:28px;
  margin-top:5px;
  margin-bottom:20px;
  transition:transform 0.15s;
}


.bump{
  transform:scale(1.25);
}

</style>

</head>

<body>

<button onclick="add('LB')">
Voix Loïc BUISSON
<div class="count" id="LB">0</div>
</button>

<button onclick="add('FR')">
Voix Florence ROPARS
<div class="count" id="FR">0</div>
</button>

<button onclick="add('Nul')">
Nul
<div class="count" id="Nul">0</div>
</button>

<button onclick="add('Blanc')">
Blanc
<div class="count" id="Blanc">0</div>
</button>

<script>

const url = "https://script.google.com/macros/s/AKfycbz7VcjH8qNR7gU-4Ea-6daw9BZEnKfok7zdr_Luiz9-Alxkf6MbG3Wl5iGOOrsOgyex/exec";

function add(v){

  if (navigator.vibrate) {
    navigator.vibrate(30);
  }
  
  const el = document.getElementById(v);

  // incrément instantané à l'écran
  let value = parseInt(el.innerText) + 1;
  el.innerText = value;

  // envoi au serveur en arrière-plan
  fetch(url + "?action=add&var=" + v)
    .then(r=>r.text())
    .then(n=>{
      el.innerText = n; // synchronisation
    });

}
function load(v){
fetch(url+"?action=get&var="+v)
.then(r=>r.text())
.then(n=>{
document.getElementById(v).innerText=n;
});
}

["LB","FR","Nul", "Blanc"].forEach(load);

document.addEventListener("DOMContentLoaded", function () {
  ["LB","FR","Nul", "Blanc"].forEach(load);
});
  
</script>

</body>
</html>
